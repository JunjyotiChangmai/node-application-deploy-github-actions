name: Deploy Nodejs Application to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ububto-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with: 
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script:
            cd /root/node-application-deploy-github-actions
            git pull
            docker compose up -d --build